title: Page générique

sections:
  content:
    type: fields
    fields:
      # Main content with blocks
      text:
        label: Contenu
        type: blocks
        required: true

      # Sidebar toggle
      show_sidebar:
        label: Afficher la barre latérale
        type: toggle
        default: false

      sidebar_title:
        label: Titre de la barre latérale
        type: text

      sidebar_text:
        label: Contenu de la barre latérale
        type: textarea

columns:
  - width: 2/3
    sections:
      content:
        type: pages

  - width: 1/3
    sections:
      info:
        type: info
